
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khazar University</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;0,400;0,500;0,700;1,400&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        khazar: {
                            maroon: '#6B345F',
                            maroonDark: '#4A2341',
                            maroonLight: '#8D4B7D',
                            cream: '#FFFEEA',
                            creamDark: '#F2F1D0',
                            gold: '#C5A059',
                            dark: '#1A0B17'
                        }
                    },
                    fontFamily: {
                        sans: ['Roboto', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                        soria: ['Playfair Display', 'serif'],
                    },
                    maxWidth: {
                        '8xl': '1440px',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #FFFEEA;
            color: #1A0B17;
            overflow-x: hidden;
        }
        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: all 1s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* Interesting Hover Effects */
        .btn-swipe {
            position: relative;
            overflow: hidden;
            z-index: 1;
        }
        .btn-swipe::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.1);
            transition: left 0.4s ease;
            z-index: -1;
        }
        .btn-swipe:hover::before {
            left: 0;
        }

        .image-zoom-container {
            overflow: hidden;
        }
        .image-zoom-container img {
            transition: transform 0.8s ease;
        }
        .image-zoom-container:hover img {
            transform: scale(1.05);
        }

        .link-grow {
            position: relative;
        }
        .link-grow::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: currentColor;
            transition: width 0.3s ease;
        }
        .link-grow:hover::after {
            width: 100%;
        }
    </style>
<script type="importmap">

}

</head>

</html>
